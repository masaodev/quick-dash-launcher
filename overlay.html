<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Overlay</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      /* トーストとレイアウト進捗で1ウィンドウを共用するため、
         bodyのモードクラス(mode-toast / mode-progress)で表示を切り替える */
      body {
        font-family: 'Segoe UI', 'Yu Gothic UI', 'Meiryo UI', sans-serif;
        background: transparent;
        overflow: hidden;
        -webkit-app-region: no-drag;
      }

      body:not(.mode-toast) .toast-container {
        display: none;
      }

      body:not(.mode-progress) .progress-container {
        display: none;
      }

      /* ===== トースト ===== */
      .toast-container {
        display: flex;
        align-items: flex-start;
        padding: 12px 16px;
        border-radius: 6px;
        border: 1px solid #ccc;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        opacity: 0;
        transform: translateY(20px);
        transition:
          opacity 0.3s ease,
          transform 0.3s ease;
        max-width: 400px;
        min-height: 80px;
        background: #ffffff;
        color: #333;
      }

      .toast-container.show {
        opacity: 1;
        transform: translateY(0);
      }

      .toast-container.hide {
        opacity: 0;
        transform: translateY(-10px);
      }

      /* アイコン部分 */
      .toast-icon-wrapper {
        flex-shrink: 0;
        width: 40px;
        height: 40px;
        margin-right: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f5f5f5;
        border-radius: 6px;
      }

      .toast-icon-wrapper img {
        width: 28px;
        height: 28px;
        border-radius: 4px;
        object-fit: contain;
      }

      .toast-icon-wrapper .default-icon {
        font-size: 24px;
        line-height: 1;
      }

      /* コンテンツ部分 */
      .toast-content {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }

      .toast-title {
        font-size: 14px;
        font-weight: 600;
        line-height: 1.3;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        color: #333;
      }

      .toast-path {
        font-size: 11px;
        line-height: 1.3;
        margin-top: 2px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        color: #666;
      }

      .toast-separator {
        height: 1px;
        background: #e0e0e0;
        margin: 6px 0;
      }

      .toast-action {
        font-size: 12px;
        line-height: 1.3;
        color: #666;
      }

      /* グループアイテム名リスト */
      .toast-items {
        font-size: 11px;
        line-height: 1.3;
        margin-top: 2px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        color: #666;
      }

      /* 従来のシンプルメッセージ用（非推奨: 新規追加時は itemType + displayName のリッチ形式を使うこと） */
      .toast-simple {
        display: flex;
        align-items: center;
        min-height: 48px;
      }

      .toast-simple-icon {
        margin-right: 10px;
        font-size: 18px;
        flex-shrink: 0;
        color: #0078d4;
      }

      .toast-simple-message {
        font-size: 13px;
        line-height: 1.4;
        word-break: break-word;
        color: #666;
      }

      /* ===== レイアウト進捗 ===== */
      .progress-container {
        background: #ffffff;
        border-radius: 8px;
        border: 1px solid #ccc;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
        flex-direction: column;
        height: 100vh;
        opacity: 0;
        transform: scale(0.95);
        transition:
          opacity 0.2s ease,
          transform 0.2s ease;
        -webkit-app-region: drag;
      }

      body.mode-progress .progress-container {
        display: flex;
      }

      .progress-container.visible {
        opacity: 1;
        transform: scale(1);
      }

      .progress-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 14px;
        border-bottom: 1px solid #e0e0e0;
      }

      .progress-header h2 {
        font-size: 13px;
        font-weight: 600;
        color: #333;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        flex: 1;
      }

      .progress-bar-container {
        position: relative;
        height: 24px;
        background: #f5f5f5;
        border-bottom: 1px solid #e0e0e0;
        overflow: hidden;
      }

      .progress-bar-fill {
        height: 100%;
        background: #4caf50;
        transition: width 0.3s ease;
        opacity: 0.3;
      }

      .progress-bar-text {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 11px;
        color: #333;
        font-weight: bold;
      }

      .entry-list {
        flex: 1;
        overflow-y: auto;
        padding: 6px;
        -webkit-app-region: no-drag;
      }

      .entry-list::-webkit-scrollbar {
        width: 4px;
      }

      .entry-list::-webkit-scrollbar-track {
        background: transparent;
      }

      .entry-list::-webkit-scrollbar-thumb {
        background: #ccc;
        border-radius: 2px;
      }

      .entry-item {
        display: flex;
        align-items: flex-start;
        gap: 6px;
        padding: 5px 8px;
        margin-bottom: 3px;
        border-radius: 4px;
        background: #f5f5f5;
      }

      .entry-item.success {
        border-left: 3px solid #4caf50;
      }
      .entry-item.failed {
        border-left: 3px solid #f44336;
      }
      .entry-item.launching {
        border-left: 3px solid #2196f3;
      }
      .entry-item.waiting {
        border-left: 3px solid #ccc;
      }

      .entry-icon {
        width: 18px;
        height: 18px;
        flex-shrink: 0;
        object-fit: contain;
      }

      .status-icon {
        font-size: 14px;
        font-weight: bold;
        line-height: 1;
        min-width: 16px;
        text-align: center;
      }

      .status-icon.waiting {
        color: #999;
      }
      .status-icon.launching {
        color: #2196f3;
        animation: spin 1s linear infinite;
      }
      .status-icon.success {
        color: #4caf50;
      }
      .status-icon.failed {
        color: #f44336;
      }

      @keyframes spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      .entry-content {
        flex: 1;
        min-width: 0;
      }

      .entry-title {
        color: #333;
        font-size: 12px;
        word-break: break-all;
      }

      .entry-process {
        color: #888;
        font-size: 10px;
        margin-left: 4px;
      }

      .entry-error {
        color: #f44336;
        font-size: 10px;
        font-style: italic;
        margin-top: 2px;
      }

      .progress-actions {
        display: flex;
        justify-content: flex-end;
        padding: 8px 14px;
        border-top: 1px solid #e0e0e0;
        -webkit-app-region: no-drag;
      }

      .btn {
        padding: 4px 16px;
        border: none;
        border-radius: 4px;
        font-size: 12px;
        cursor: pointer;
        transition: background 0.15s;
      }

      .btn-cancel {
        background: #c62828;
        color: white;
      }

      .btn-cancel:hover {
        background: #e53935;
      }

      .btn-close {
        background: #0078d4;
        color: white;
      }

      .btn-close:hover {
        background: #1a88e0;
      }
    </style>
  </head>
  <body>
    <div id="toast" class="toast-container"></div>

    <div class="progress-container" id="container">
      <div class="progress-header">
        <h2 id="layoutName"></h2>
      </div>
      <div class="progress-bar-container">
        <div class="progress-bar-fill" id="progressFill"></div>
        <span class="progress-bar-text" id="progressText">0 / 0</span>
      </div>
      <div class="entry-list" id="entryList"></div>
      <div class="progress-actions">
        <button class="btn btn-cancel" id="actionBtn" onclick="handleAction()">キャンセル</button>
      </div>
    </div>

    <script>
      // ===== トースト =====

      // タイプ別設定（アイコンとアクション文言を統合管理）
      const itemTypeConfig = {
        url: { icon: '🌐', action: 'URLを開いています...' },
        app: { icon: '⚙️', action: 'アプリを起動中...' },
        file: { icon: '📄', action: 'ファイルを開いています...' },
        folder: { icon: '📁', action: 'フォルダーを開いています...' },
        customUri: { icon: '🔗', action: '起動中...' },
        group: { icon: '📦', action: null },
        windowOperation: { icon: '🪟', action: 'ウィンドウ操作を実行します' },
        windowActivate: { icon: '🔄', action: 'ウィンドウをアクティブ化しました' },
        windowClose: { icon: '✖️', action: 'ウィンドウを閉じました' },
        windowPin: { icon: '📌', action: 'ウィンドウを全デスクトップに固定しました' },
        windowUnpin: { icon: '🔓', action: 'ウィンドウの固定を解除しました' },
        windowMoveDesktop: { icon: '➡️', action: null },
        workspaceAdd: { icon: '⭐', action: 'ワークスペースに追加しました' },
        clipboard: { icon: '📋', action: 'クリップボードに復元しています...' },
        bookmarkImport: { icon: '🔖', action: null },
      };

      const DEFAULT_ICON = '📋';

      // 従来のアイコン（シンプルメッセージ用）
      const legacyIcons = {
        success: '✓',
        error: '✕',
        info: 'ℹ',
        warning: '⚠',
      };

      function getDefaultIcon(itemType) {
        const config = itemTypeConfig[itemType];
        return config ? config.icon : DEFAULT_ICON;
      }

      function getActionText(itemType) {
        const config = itemTypeConfig[itemType];
        return config ? config.action : '起動中...';
      }

      // パス省略（40文字超で中間省略）
      function truncatePath(path, maxLength = 40) {
        if (!path || path.length <= maxLength) return path;
        return path.substring(0, 15) + '...' + path.substring(path.length - 20);
      }

      // グループアイテム名のフォーマット
      function formatGroupItems(itemNames, itemCount) {
        if (!itemNames || itemNames.length === 0) {
          return `${itemCount || 0}件のアイテムを起動します`;
        }
        const displayNames = itemNames.slice(0, 3).join(', ');
        const remaining = (itemCount || itemNames.length) - 3;
        if (remaining > 0) {
          return `${displayNames}... 他${remaining}件`;
        }
        return displayNames;
      }

      // HTMLエスケープ
      function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
      }

      // アイコンHTML生成
      function buildIconHtml(icon, itemType) {
        const fallback = getDefaultIcon(itemType);
        if (icon) {
          return `<img src="${escapeHtml(icon)}" alt="" onerror="this.parentElement.innerHTML='<span class=\\'default-icon\\'>${fallback}</span>'" />`;
        }
        return `<span class="default-icon">${fallback}</span>`;
      }

      // 新形式トーストのコンテンツ部分を生成
      function buildItemContent(data) {
        const { itemType, displayName, path, itemCount, itemNames, message } = data;
        let html = `<div class="toast-title">${escapeHtml(displayName)}</div>`;

        if (itemType === 'group') {
          const count = itemCount || (itemNames ? itemNames.length : 0);
          html += `<div class="toast-items">${escapeHtml(formatGroupItems(itemNames, itemCount))}</div>`;
          html += '<div class="toast-separator"></div>';
          html += `<div class="toast-action">${count}件のアイテムを起動します</div>`;
        } else {
          if (path) {
            html += `<div class="toast-path">${escapeHtml(truncatePath(path))}</div>`;
          }
          html += '<div class="toast-separator"></div>';
          // messageが指定されていればそれを使用、なければitemTypeから取得
          const actionText = message || getActionText(itemType);
          html += `<div class="toast-action">${escapeHtml(actionText)}</div>`;
        }

        return html;
      }

      // IPC経由でトースト表示リクエストを受け取る
      if (window.electronAPI && window.electronAPI.onShowToast) {
        window.electronAPI.onShowToast((data) => {
          showToast(data);
        });
      }

      function showToast(data) {
        const { message, type = 'success', duration = 2500, itemType, displayName } = data;

        document.body.className = 'mode-toast';

        const toast = document.getElementById('toast');
        toast.className = 'toast-container ' + type;

        if (itemType && displayName) {
          // リッチ形式（推奨: 新規追加時はこちらを使うこと）
          toast.innerHTML =
            '<div class="toast-icon-wrapper">' +
            buildIconHtml(data.icon, itemType) +
            '</div>' +
            '<div class="toast-content">' +
            buildItemContent(data) +
            '</div>';
        } else {
          // 旧形式フォールバック（非推奨: 現在使用箇所なし）
          toast.innerHTML =
            '<div class="toast-simple">' +
            `<span class="toast-simple-icon">${legacyIcons[type] || legacyIcons.success}</span>` +
            `<span class="toast-simple-message">${escapeHtml(message || '')}</span>` +
            '</div>';
        }

        requestAnimationFrame(() => {
          toast.classList.add('show');
        });

        setTimeout(() => {
          toast.classList.remove('show');
          toast.classList.add('hide');
        }, duration);
      }

      // ===== レイアウト進捗 =====

      let isComplete = false;
      let autoCloseTimer = null;

      const statusIcons = {
        waiting: '<span class="status-icon waiting">○</span>',
        launching: '<span class="status-icon launching">⟳</span>',
        success: '<span class="status-icon success">✓</span>',
        failed: '<span class="status-icon failed">✗</span>',
      };

      let renderedEntryCount = 0;

      function buildEntryHtml(entry) {
        return (
          '<div class="entry-item ' +
          entry.status +
          '" data-index="' +
          entry.index +
          '">' +
          statusIcons[entry.status] +
          (entry.icon
            ? '<img class="entry-icon" src="' + escapeAttr(entry.icon) + '" />'
            : '<div class="entry-icon"></div>') +
          '<div class="entry-content">' +
          '<span class="entry-title">' +
          escapeHtml(entry.windowTitle) +
          (entry.processName
            ? '<span class="entry-process">(' + escapeHtml(entry.processName) + ')</span>'
            : '') +
          '</span>' +
          '<div class="entry-error"></div>' +
          '</div>' +
          '</div>'
        );
      }

      function updateUI(data) {
        document.getElementById('layoutName').textContent = data.layoutName;

        const successCount = data.entries.filter((e) => e.status === 'success').length;
        const failedCount = data.entries.filter((e) => e.status === 'failed').length;
        const completedCount = successCount + failedCount;
        const totalCount = data.entries.length;
        const percent = totalCount > 0 ? (completedCount / totalCount) * 100 : 0;

        document.getElementById('progressFill').style.width = percent + '%';
        document.getElementById('progressText').textContent = completedCount + ' / ' + totalCount;

        const entryList = document.getElementById('entryList');

        if (renderedEntryCount !== totalCount) {
          entryList.innerHTML = data.entries.map(buildEntryHtml).join('');
          renderedEntryCount = totalCount;
        } else {
          data.entries.forEach((entry) => {
            const el = entryList.children[entry.index];
            if (!el) return;
            el.className = 'entry-item ' + entry.status;
            el.querySelector('.status-icon').outerHTML = statusIcons[entry.status];
            const errorEl = el.querySelector('.entry-error');
            if (errorEl) {
              errorEl.textContent = entry.errorMessage || '';
            }
          });
        }

        isComplete = data.isComplete;
        const btn = document.getElementById('actionBtn');
        if (isComplete) {
          btn.textContent = '閉じる';
          btn.className = 'btn btn-close';
        } else {
          btn.textContent = 'キャンセル';
          btn.className = 'btn btn-cancel';
        }
      }

      function escapeAttr(str) {
        return str.replace(/&/g, '&amp;').replace(/"/g, '&quot;');
      }

      function handleAction() {
        if (isComplete) {
          closeWindow();
        } else {
          window.electronAPI.cancelLayout();
        }
      }

      function closeWindow() {
        const container = document.getElementById('container');
        container.classList.remove('visible');
        setTimeout(() => {
          window.electronAPI.closeLayoutProgressWindow();
        }, 200);
      }

      // IPC listeners
      window.electronAPI.onLayoutProgress('start', (data) => {
        if (autoCloseTimer) {
          clearTimeout(autoCloseTimer);
          autoCloseTimer = null;
        }
        document.body.className = 'mode-progress';
        renderedEntryCount = 0;
        updateUI(data);
        const container = document.getElementById('container');
        container.classList.add('visible');
      });

      window.electronAPI.onLayoutProgress('update', (data) => {
        updateUI(data);
      });

      window.electronAPI.onLayoutProgress('complete', (data) => {
        updateUI(data);
        const allSuccess = data.entries.every((e) => e.status === 'success');
        if (allSuccess && !data.isCancelled) {
          autoCloseTimer = setTimeout(() => {
            autoCloseTimer = null;
            closeWindow();
          }, 2000);
        }
      });

      // Escapeキー（進捗モードのみ。トーストモードはfocusable:falseでキー入力なし）
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && document.body.classList.contains('mode-progress')) {
          e.preventDefault();
          handleAction();
        }
      });
    </script>
  </body>
</html>
