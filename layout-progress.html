<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Layout Progress</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Segoe UI', 'Yu Gothic UI', 'Meiryo UI', sans-serif;
        background: transparent;
        overflow: hidden;
        -webkit-app-region: drag;
      }

      .progress-container {
        background: #ffffff;
        border-radius: 8px;
        border: 1px solid #ccc;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
        display: flex;
        flex-direction: column;
        height: 100vh;
        opacity: 0;
        transform: scale(0.95);
        transition:
          opacity 0.2s ease,
          transform 0.2s ease;
      }

      .progress-container.visible {
        opacity: 1;
        transform: scale(1);
      }

      .progress-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 14px;
        border-bottom: 1px solid #e0e0e0;
      }

      .progress-header h2 {
        font-size: 13px;
        font-weight: 600;
        color: #333;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        flex: 1;
      }

      .progress-bar-container {
        position: relative;
        height: 24px;
        background: #f5f5f5;
        border-bottom: 1px solid #e0e0e0;
        overflow: hidden;
      }

      .progress-bar-fill {
        height: 100%;
        background: #4caf50;
        transition: width 0.3s ease;
        opacity: 0.3;
      }

      .progress-bar-text {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 11px;
        color: #333;
        font-weight: bold;
      }

      .entry-list {
        flex: 1;
        overflow-y: auto;
        padding: 6px;
        -webkit-app-region: no-drag;
      }

      .entry-list::-webkit-scrollbar {
        width: 4px;
      }

      .entry-list::-webkit-scrollbar-track {
        background: transparent;
      }

      .entry-list::-webkit-scrollbar-thumb {
        background: #ccc;
        border-radius: 2px;
      }

      .entry-item {
        display: flex;
        align-items: flex-start;
        gap: 6px;
        padding: 5px 8px;
        margin-bottom: 3px;
        border-radius: 4px;
        background: #f5f5f5;
      }

      .entry-item.success {
        border-left: 3px solid #4caf50;
      }
      .entry-item.failed {
        border-left: 3px solid #f44336;
      }
      .entry-item.launching {
        border-left: 3px solid #2196f3;
      }
      .entry-item.waiting {
        border-left: 3px solid #ccc;
      }

      .entry-icon {
        width: 18px;
        height: 18px;
        flex-shrink: 0;
        object-fit: contain;
      }

      .status-icon {
        font-size: 14px;
        font-weight: bold;
        line-height: 1;
        min-width: 16px;
        text-align: center;
      }

      .status-icon.waiting {
        color: #999;
      }
      .status-icon.launching {
        color: #2196f3;
        animation: spin 1s linear infinite;
      }
      .status-icon.success {
        color: #4caf50;
      }
      .status-icon.failed {
        color: #f44336;
      }

      @keyframes spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      .entry-content {
        flex: 1;
        min-width: 0;
      }

      .entry-title {
        color: #333;
        font-size: 12px;
        word-break: break-all;
      }

      .entry-process {
        color: #888;
        font-size: 10px;
        margin-left: 4px;
      }

      .entry-error {
        color: #f44336;
        font-size: 10px;
        font-style: italic;
        margin-top: 2px;
      }

      .progress-actions {
        display: flex;
        justify-content: flex-end;
        padding: 8px 14px;
        border-top: 1px solid #e0e0e0;
        -webkit-app-region: no-drag;
      }

      .btn {
        padding: 4px 16px;
        border: none;
        border-radius: 4px;
        font-size: 12px;
        cursor: pointer;
        transition: background 0.15s;
      }

      .btn-cancel {
        background: #c62828;
        color: white;
      }

      .btn-cancel:hover {
        background: #e53935;
      }

      .btn-close {
        background: #0078d4;
        color: white;
      }

      .btn-close:hover {
        background: #1a88e0;
      }
    </style>
  </head>
  <body>
    <div class="progress-container" id="container">
      <div class="progress-header">
        <h2 id="layoutName"></h2>
      </div>
      <div class="progress-bar-container">
        <div class="progress-bar-fill" id="progressFill"></div>
        <span class="progress-bar-text" id="progressText">0 / 0</span>
      </div>
      <div class="entry-list" id="entryList"></div>
      <div class="progress-actions">
        <button class="btn btn-cancel" id="actionBtn" onclick="handleAction()">キャンセル</button>
      </div>
    </div>

    <script>
      let isComplete = false;
      let autoCloseTimer = null;

      const statusIcons = {
        waiting: '<span class="status-icon waiting">○</span>',
        launching: '<span class="status-icon launching">⟳</span>',
        success: '<span class="status-icon success">✓</span>',
        failed: '<span class="status-icon failed">✗</span>',
      };

      let renderedEntryCount = 0;

      function buildEntryHtml(entry) {
        return (
          '<div class="entry-item ' +
          entry.status +
          '" data-index="' +
          entry.index +
          '">' +
          statusIcons[entry.status] +
          (entry.icon
            ? '<img class="entry-icon" src="' + escapeAttr(entry.icon) + '" />'
            : '<div class="entry-icon"></div>') +
          '<div class="entry-content">' +
          '<span class="entry-title">' +
          escapeHtml(entry.windowTitle) +
          (entry.processName
            ? '<span class="entry-process">(' + escapeHtml(entry.processName) + ')</span>'
            : '') +
          '</span>' +
          '<div class="entry-error"></div>' +
          '</div>' +
          '</div>'
        );
      }

      function updateUI(data) {
        document.getElementById('layoutName').textContent = data.layoutName;

        const successCount = data.entries.filter((e) => e.status === 'success').length;
        const failedCount = data.entries.filter((e) => e.status === 'failed').length;
        const completedCount = successCount + failedCount;
        const totalCount = data.entries.length;
        const percent = totalCount > 0 ? (completedCount / totalCount) * 100 : 0;

        document.getElementById('progressFill').style.width = percent + '%';
        document.getElementById('progressText').textContent = completedCount + ' / ' + totalCount;

        const entryList = document.getElementById('entryList');

        if (renderedEntryCount !== totalCount) {
          entryList.innerHTML = data.entries.map(buildEntryHtml).join('');
          renderedEntryCount = totalCount;
        } else {
          data.entries.forEach((entry) => {
            const el = entryList.children[entry.index];
            if (!el) return;
            el.className = 'entry-item ' + entry.status;
            el.querySelector('.status-icon').outerHTML = statusIcons[entry.status];
            const errorEl = el.querySelector('.entry-error');
            if (errorEl) {
              errorEl.textContent = entry.errorMessage || '';
            }
          });
        }

        isComplete = data.isComplete;
        const btn = document.getElementById('actionBtn');
        if (isComplete) {
          btn.textContent = '閉じる';
          btn.className = 'btn btn-close';
        } else {
          btn.textContent = 'キャンセル';
          btn.className = 'btn btn-cancel';
        }
      }

      function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
      }

      function escapeAttr(str) {
        return str.replace(/&/g, '&amp;').replace(/"/g, '&quot;');
      }

      function handleAction() {
        if (isComplete) {
          closeWindow();
        } else {
          window.electronAPI.cancelLayout();
        }
      }

      function closeWindow() {
        const container = document.getElementById('container');
        container.classList.remove('visible');
        setTimeout(() => {
          window.electronAPI.closeLayoutProgressWindow();
        }, 200);
      }

      // IPC listeners
      window.electronAPI.onLayoutProgress('start', (data) => {
        if (autoCloseTimer) {
          clearTimeout(autoCloseTimer);
          autoCloseTimer = null;
        }
        renderedEntryCount = 0;
        updateUI(data);
        const container = document.getElementById('container');
        container.classList.add('visible');
      });

      window.electronAPI.onLayoutProgress('update', (data) => {
        updateUI(data);
      });

      window.electronAPI.onLayoutProgress('complete', (data) => {
        updateUI(data);
        const allSuccess = data.entries.every((e) => e.status === 'success');
        if (allSuccess && !data.isCancelled) {
          autoCloseTimer = setTimeout(() => {
            autoCloseTimer = null;
            closeWindow();
          }, 2000);
        }
      });

      // Escape key
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          e.preventDefault();
          handleAction();
        }
      });
    </script>
  </body>
</html>
