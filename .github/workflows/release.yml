# リリース自動化ワークフロー
# タグがプッシュされたときに、Windowsインストーラーを自動ビルドし、
# GitHub Releasesに公開するワークフロー
# 注意: 想定外の事態が発生した場合はユーザーに確認を求めること

name: Release

# トリガー条件: v*形式のタグがプッシュされたとき（例: v1.0.0）
on:
  push:
    tags:
      - 'v*'

# 権限設定（リリース作成とファイルアップロードに必要）
permissions:
  contents: write

jobs:
  release:
    # Windows環境で実行（Electronアプリのビルドに必要）
    # windows-latestはVisual Studio 18に更新されnode-gyp 11.5.0が認識できない
    # （unknown version undefined）ため、VS 2022を含む安定版windows-2022に固定する
    runs-on: windows-2022

    steps:
      # リポジトリのコードをチェックアウト
      - name: Checkout code
        uses: actions/checkout@v6

      # Node.js環境のセットアップ（バージョン22を使用）
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      # Python環境のセットアップ（node-gyp安定化のため3.11を固定）
      # ランナー標準のPython 3.14はnode-gypと相性問題を起こすため明示的に固定する
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 依存関係のインストール（package-lock.jsonを使用した確実なインストール）
      # GYP_MSVS_VERSION: node-gypのVisual Studio自動検出（列挙時にmaxBuffer超過で失敗する）を
      # スキップし、VS 2022を明示指定する
      - name: Install dependencies
        run: npm ci
        env:
          GYP_MSVS_VERSION: '2022'

      # アプリケーションのビルドとWindowsインストーラーの作成
      # npm run dist は内部で npm run build を実行し、その prebuild でライセンスファイルも生成される
      - name: Build and package
        run: npm run dist -- --publish never
        env:
          GYP_MSVS_VERSION: '2022'

      # タグ名からバージョン番号を抽出（v1.0.0 → 1.0.0）
      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
        shell: bash

      # ビルド結果のファイルを確認（デバッグ用）
      - name: List release directory
        run: dir release
        shell: cmd

      # GitHub Releaseの作成と成果物のアップロード
      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            ## 更新内容
            QuickDashLauncher ${{ github.ref_name }} のリリースです。

            ## インストール方法

            ### インストーラー版
            `QuickDashLauncher-Setup-${{ steps.get_version.outputs.VERSION }}.exe` をダウンロードして実行してください。

            ### ポータブル版
            `QuickDashLauncher-${{ steps.get_version.outputs.VERSION }}.exe` をダウンロードして任意の場所に配置してください。インストール不要で直接実行できます。

            ## 機能
            - Alt+Spaceでランチャー起動（デフォルト、設定で変更可能）
            - Webサイト、アプリケーション、フォルダへの素早いアクセス
            - フォルダ取込機能でファイル一覧の自動取得

            ## ライセンス情報
            このソフトウェアはMITライセンスの下で公開されています。
            依存パッケージのライセンスについては、`THIRD-PARTY-NOTICES.md`を参照してください。
          draft: false
          prerelease: false
          files: |
            release/*.exe
            release/*.exe.blockmap
            release/latest.yml
            THIRD-PARTY-NOTICES.md
